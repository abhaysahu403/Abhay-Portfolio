name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  docker:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio:${{ github.sha }} .
        docker tag ${{ secrets.DOCKER_USERNAME }}/portfolio:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/portfolio:latest

    - name: Push Docker Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/portfolio:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/portfolio:latest